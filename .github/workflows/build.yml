name: Android Build

on:
push:
branches:
- main
- master

pull_request:
branches:
- main
- master

jobs:
build:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Grant Execute Permission
    run: chmod +x gradlew

  - name: Build APK
    run: ./gradlew assembleDebug
```
